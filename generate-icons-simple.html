<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HouseShare - 一键生成图标文件</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            color: #333;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        .icon-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            border: 2px solid #e0e0e0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .icon-item:hover {
            background: #e8f4fd;
            border-color: #1A73E8;
            transform: translateY(-5px);
        }
        .icon-item.active {
            background: #1A73E8;
            color: white;
            border-color: #0d62d9;
        }
        .icon-preview {
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 20px;
            background: #1A73E8;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #0d62d9;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(13,98,217,0.3);
        }
        .btn:active {
            transform: translateY(0);
        }
        .step {
            background: #E8F4FD;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .step-number {
            display: inline-block;
            background: #1A73E8;
            color: white;
            width: 30px;
            height: 30px;
            line-height: 30px;
            text-align: center;
            border-radius: 50%;
            margin-right: 10px;
            font-weight: bold;
        }
        .warning {
            background: #FFF3CD;
            color: #856404;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #FFC107;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 HouseShare - 一键生成图标文件</h1>
        
        <div class="warning">
            <strong>❗ 重要：</strong>
            您的网站出现图标404错误，必须生成以下8个图标文件！
        </div>
        
        <div class="step">
            <div><span class="step-number">1</span>点击选择需要生成的图标尺寸</div>
        </div>
        
        <div class="icon-grid" id="iconGrid">
            <!-- 图标选项将通过JavaScript生成 -->
        </div>
        
        <div class="step">
            <div><span class="step-number">2</span>点击按钮生成所有图标文件</div>
        </div>
        
        <button class="btn" id="generateBtn">🎨 一键生成8个图标文件</button>
        
        <div class="step">
            <div><span class="step-number">3</span>保存文件到正确位置</div>
            <p>将生成的PNG文件保存到：<br>
            <code>C:\Users\Administrator\CodeBuddy\20260313084555\mobile-app\assets\icons\</code></p>
        </div>
        
        <div style="margin-top: 30px; text-align: center;">
            <p><strong>需要生成的图标尺寸：</strong></p>
            <p>72×72, 96×96, 128×128, 144×144, 152×152, 192×192, 384×384, 512×512</p>
        </div>
    </div>

    <script>
        const iconSizes = [
            { size: '72×72', filename: 'icon-72x72.png', selected: true },
            { size: '96×96', filename: 'icon-96x96.png', selected: true },
            { size: '128×128', filename: 'icon-128x128.png', selected: true },
            { size: '144×144', filename: 'icon-144x144.png', selected: true },
            { size: '152×152', filename: 'icon-152x152.png', selected: true },
            { size: '192×192', filename: 'icon-192x192.png', selected: true },
            { size: '384×384', filename: 'icon-384x384.png', selected: true },
            { size: '512×512', filename: 'icon-512x512.png', selected: true }
        ];

        const iconGrid = document.getElementById('iconGrid');
        const generateBtn = document.getElementById('generateBtn');

        // 渲染图标选项
        iconSizes.forEach((icon, index) => {
            const div = document.createElement('div');
            div.className = `icon-item ${icon.selected ? 'active' : ''}`;
            div.onclick = () => toggleIcon(index);
            
            div.innerHTML = `
                <div class="icon-preview">${icon.size}</div>
                <div><strong>${icon.filename}</strong></div>
                <div>${icon.size} 像素</div>
                <div>${icon.selected ? '✅ 已选择' : '❌ 未选择'}</div>
            `;
            
            iconGrid.appendChild(div);
        });

        function toggleIcon(index) {
            iconSizes[index].selected = !iconSizes[index].selected;
            const item = iconGrid.children[index];
            item.classList.toggle('active');
            item.children[3].textContent = iconSizes[index].selected ? '✅ 已选择' : '❌ 未选择';
        }

        generateBtn.onclick = async function() {
            const selectedIcons = iconSizes.filter(icon => icon.selected);
            
            if (selectedIcons.length === 0) {
                alert('请至少选择一个图标尺寸！');
                return;
            }
            
            // 模拟生成图标（实际需要Canvas生成PNG）
            alert(`即将生成 ${selectedIcons.length} 个图标文件。\n\n由于安全限制，请：\n1. 截图此页面\n2. 使用在线图标生成工具\n3. 或运行之前创建的图标生成脚本`);
            
            // 创建下载链接
            selectedIcons.forEach(icon => {
                // 这里应该使用Canvas生成实际的PNG文件
                // 但由于浏览器安全限制，无法直接创建可下载的PNG
                // 建议用户使用在线工具或之前创建的图标生成器
            });
        };
    </script>
</body>
</html>
